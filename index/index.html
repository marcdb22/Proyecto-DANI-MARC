<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReservaEsport - Gestión de Pistas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-glow"></div>
    
    <header>
        <div class="container">
            <h1>Reserva<span>Esport</span></h1>
            <p>Panel de Control de Reservas</p>
        </div>
    </header>

    <main class="container">
        <div class="dashboard-card">
            <div class="card-header">
                <h2>Nueva Reserva</h2>
                <div class="badge">Formulario</div>
            </div>
            
            <form id="reserva-form" action="procesar.php" method="POST">
                <div class="form-group">
                    <label for="usuario">Usuario</label>
                    <input type="text" id="usuario" name="usuario" placeholder="Tu nombre" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="hora">Hora</label>
                        <input type="time" id="hora" name="hora" required>
                    </div>

                    <div class="form-group">
                        <label for="pista">Pista</label>
                        <select id="pista" name="pista" required>
                            <option value="" disabled selected>Selecciona una pista</option>
                            <option value="central">Pista Central</option>
                            <option value="pista1">Pista 1</option>
                            <option value="pista2">Pista 2</option>
                            <option value="padel">Pista de Pádel</option>
                        </select>
                    </div>
                </div>

                <button type="submit" class="submit-btn">Realizar Reserva</button>
            </form>
        </div>
    </main>

    <footer>
        <p>&copy; 2024 ReservaEsport. Todos los derechos reservados.</p>
    </footer>
</body>
</html>
